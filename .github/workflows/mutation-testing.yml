name: Mutation Testing

on:
  push:
    branches: [main, master]
    paths:
      - 'frontend/src/utils/**'
      - 'frontend/tests/**'
  pull_request:
    branches: [main, master]
    paths:
      - 'frontend/src/utils/**'
      - 'frontend/tests/**'
  # Allow manual trigger
  workflow_dispatch:

jobs:
  mutation:
    name: Mutation Testing
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.3.0
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm install

      - name: Run mutation tests
        run: npm run test:mutation
        # Don't fail the job on Stryker threshold — tracker handles that
        continue-on-error: true

      - name: Track score & detect regressions
        run: npm run test:mutation:track

      - name: Upload mutation report
        if: always()
        uses: actions/upload-artifact@4cec3d8aa04e39d1a68cf68afc9e65e5a3b5a4f # v4.4.0
        with:
          name: mutation-report
          path: |
            mutation-reports/mutation-report.html
            mutation-reports/mutation-report.json
          if-no-files-found: ignore
