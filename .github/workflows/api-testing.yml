name: API Testing

on:
  push:
    branches: [main, 'feature/**']
  pull_request:
    branches: [main]

jobs:
  api-tests:
    name: API Contract & Performance Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.3.0
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run API tests
        run: npx vitest run backend/tests/api-testing.test.js --reporter=verbose
        env:
          NODE_ENV: test
          STELLAR_NETWORK: testnet
          HORIZON_URL: https://horizon-testnet.stellar.org

      - name: Upload API test report
        if: always()
        uses: actions/upload-artifact@4cec3d8aa04e39d1a68cf68afc9e65e5a3b5a4f # v4.4.0
        with:
          name: api-test-report-${{ github.sha }}
          path: test-reports/
          retention-days: 14
