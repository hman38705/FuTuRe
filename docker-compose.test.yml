version: '3.8'

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: future_test
      POSTGRES_USER: future_admin
      POSTGRES_PASSWORD: test_password
    ports:
      - '5433:5432'
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U future_admin -d future_test']
      interval: 5s
      timeout: 5s
      retries: 5

  db_readonly:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: future_test
      POSTGRES_USER: future_admin
      POSTGRES_PASSWORD: test_password
    ports:
      - '5434:5432'
    tmpfs:
      - /var/lib/postgresql/data
    command: >
      postgres -c "log_statement=all"
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U future_admin -d future_test']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD-SHELL', 'redis-cli ping']
      interval: 5s
      timeout: 5s
      retries: 5
