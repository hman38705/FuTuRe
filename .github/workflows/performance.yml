name: Performance Tests

on:
  push:
    branches: [main, 'feature/**']
  pull_request:
    branches: [main]
  # Allow manual trigger with custom parameters
  workflow_dispatch:
    inputs:
      run_k6:
        description: 'Run k6 load tests against a live server'
        required: false
        default: 'false'
        type: boolean

jobs:
  # ── Job 1: Vitest performance benchmarks (always runs, no server needed) ────
  performance-benchmarks:
    name: Performance Benchmarks (Vitest)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.3.0
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run performance benchmark tests
        run: npx vitest run backend/tests/performance.benchmark.test.js --reporter=verbose
        env:
          NODE_ENV: test

      - name: Upload benchmark results
        if: always()
        uses: actions/upload-artifact@4cec3d8aa04e39d1a68cf68afc9e65e5a3b5a4f # v4.4.0
        with:
          name: benchmark-results
          path: backend/data/load-tests/
          retention-days: 30

  # ── Job 2: k6 load tests (only on manual trigger or main branch) ─────────────
  k6-load-tests:
    name: k6 Load Tests
    runs-on: ubuntu-latest
    # Only run k6 when explicitly requested or on main
    if: |
      github.ref == 'refs/heads/main' ||
      github.event.inputs.run_k6 == 'true'

    services:
      backend:
        image: node:20
        options: --health-cmd "curl -f http://localhost:3001/health || exit 1"
                 --health-interval 10s
                 --health-timeout 5s
                 --health-retries 5

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.3.0
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Start backend server
        run: |
          cp backend/.env.example backend/.env
          node backend/src/server.js &
          echo "SERVER_PID=$!" >> $GITHUB_ENV
          # Wait for server to be ready
          for i in $(seq 1 15); do
            curl -sf http://localhost:3001/health && break
            echo "Waiting for server... ($i/15)"
            sleep 2
          done
        env:
          NODE_ENV: test
          STELLAR_NETWORK: testnet
          HORIZON_URL: https://horizon-testnet.stellar.org
          PORT: 3001

      - name: Install k6
        run: |
          sudo gpg -k
          sudo gpg --no-default-keyring \
            --keyring /usr/share/keyrings/k6-archive-keyring.gpg \
            --keyserver hkp://keyserver.ubuntu.com:80 \
            --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" \
            | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install k6 -y

      - name: Run k6 regression test (CI gate)
        run: |
          k6 run \
            --out json=backend/data/load-tests/k6-regression-${{ github.sha }}.json \
            backend/load-tests/k6/scenarios/performance-regression.js
        env:
          BASE_URL: http://localhost:3001

      - name: Run k6 API endpoint test
        run: |
          k6 run \
            --out json=backend/data/load-tests/k6-endpoints-${{ github.sha }}.json \
            backend/load-tests/k6/scenarios/api-endpoints.js
        env:
          BASE_URL: http://localhost:3001

      - name: Run k6 concurrent users test
        run: |
          k6 run \
            --out json=backend/data/load-tests/k6-concurrent-${{ github.sha }}.json \
            backend/load-tests/k6/scenarios/concurrent-users.js
        env:
          BASE_URL: http://localhost:3001

      - name: Stop backend server
        if: always()
        run: kill $SERVER_PID || true

      - name: Upload k6 results
        if: always()
        uses: actions/upload-artifact@4cec3d8aa04e39d1a68cf68afc9e65e5a3b5a4f # v4.4.0
        with:
          name: k6-results-${{ github.sha }}
          path: backend/data/load-tests/k6-*.json
          retention-days: 30

  # ── Job 3: Performance regression gate (compares against stored baseline) ───
  regression-gate:
    name: Performance Regression Gate
    runs-on: ubuntu-latest
    needs: performance-benchmarks

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.3.0
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Download benchmark artifacts
        uses: actions/download-artifact@65a825375eb6f4d48f1f442d6ca8bc52e8e7f96e # v4.1.4
        with:
          name: benchmark-results
          path: backend/data/load-tests/
        continue-on-error: true  # First run won't have a baseline

      - name: Run regression detection tests
        run: npx vitest run backend/tests/performance.benchmark.test.js --reporter=verbose
        env:
          NODE_ENV: test

      - name: Comment PR with performance summary
        if: github.event_name == 'pull_request'
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '✅ **Performance benchmarks passed.** No regressions detected.\n\nSee the `benchmark-results` artifact for detailed metrics.'
            })
